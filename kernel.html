---
layout: default
title: kernel
permalink: /kernel
var: kernel
---
<h2 class="post-list-heading">{{ page.title | default: "kernel" }}</h2>
<ul class="post-list">
    {% for chap in site.kernel%}
    <li>
        {%- assign date_format = site.minima.date_format | default: "%b %-d, %Y" -%}
        <span class="post-meta">{{ chap.date | date: date_format }}</span>
        <h3>
            <a href="{{chap.url}}">
                {{ chap.title }}
            </a>
        </h3>
    </li>
    {% endfor %}
</ul>
